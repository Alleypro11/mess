<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ffc3a0);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    position:relative;
    width:320px;
    height:220px;
}

.envelope{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff6b9d;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    overflow:hidden;
    transition:1s;
}

.envelope::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#ff8fb1;
    clip-path:polygon(0 0, 50% 50%, 100% 0);
    transform-origin:top;
    transition:1s;
}

.envelope.open::before{
    transform:rotateX(180deg);
}

.letter{
    position:absolute;
    width:90%;
    height:90%;
    background:white;
    left:5%;
    top:5%;
    border-radius:10px;
    padding:20px;
    text-align:center;
    transform:translateY(100%);
    transition:1s;
    color:#ff4d88;
}

.envelope.open .letter{
    transform:translateY(0);
}

h1{
    margin-top:10px;
    font-size:28px;
}

p{
    margin-top:15px;
    line-height:1.5;
    color:#555;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#ff4d88;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh);
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">
    <div class="envelope" onclick="openLetter()">

        <div class="letter">
            <h1>Hi Love ❤️</h1>

            <p>
                I made this little website just for you.<br><br>
                Thank you for always making me smile and feel loved :)
            </p>

            <button onclick="showLove(event)">
                Click Me
            </button>
        </div>

    </div>
</div>

<script>
function openLetter(){
    document.querySelector('.envelope').classList.add('open');
}

function showLove(event){
    event.stopPropagation();
    alert("I love you so much ❤️");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
