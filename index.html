<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>

    <style>
        body{
            background: #ffd6e7;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        .card{
            background: white;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1{
            color: #ff4f81;
        }

        p{
            font-size: 18px;
        }

        button{
            background: #ff4f81;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover{
            background: #ff2e6d;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Hello Love ❤️</h1>

        <p>
            I made this little website just for you.
            Thank you for always making me happy :)
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage(){
            alert("I love you so much ❤️");
        }
    </script>

</body>
</html>
