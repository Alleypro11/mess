<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffc3a0, #ffdde1);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:350px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.15);
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

h1{
    font-size:38px;
    margin-bottom:20px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px #ff4d88;
    }
}

p{
    font-size:18px;
    line-height:1.6;
    margin-bottom:25px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d88;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff4d88;
    color:white;
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation: fall linear infinite;
    top:-10%;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hi Love ❤️</h1>

    <p>
        I made this tiny website just for you.<br>
        Thank you for being my favorite person ever :)
    </p>

    <button onclick="showLove()">
        Click Me
    </button>
</div>

<script>
function showLove(){
    alert("I love you sooo much ❤️");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
